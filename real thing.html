<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kwa Muthuri Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #f0a500;
  --green: #1b4a2e;
  --mgreen: #2e7d4f;
  --dgreen: #0d2e18;
  --cream: #f5f0e8;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Barlow Condensed", sans-serif;
  background: var(--dgreen);
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

/* ── LOADER ── */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(ellipse at center, #1b4a2e 0%, #0d2e18 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.l-rings { position:relative; width:200px; height:200px; display:flex; align-items:center; justify-content:center; }
.l-ring { position:absolute; border-radius:50%; border:3px solid transparent; }
.lr1 { width:200px; height:200px; border-top-color:var(--gold); border-right-color:var(--gold); animation:spin 1.8s linear infinite; }
.lr2 { width:160px; height:160px; border-bottom-color:#c47e00; border-left-color:#c47e00; animation:spin 1.2s linear infinite reverse; }
.lr3 { width:120px; height:120px; border-top-color:var(--gold); animation:spin 2.4s linear infinite; }
.l-logo { position:absolute; width:88px; height:88px; border-radius:50%; overflow:hidden; border:3px solid var(--gold); box-shadow:0 0 30px rgba(240,165,0,0.5); animation:glow 2s ease-in-out infinite; }
.l-logo img { width:100%; height:100%; object-fit:cover; }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(240,165,0,0.4);}50%{box-shadow:0 0 50px rgba(240,165,0,0.9);} }
.l-text { margin-top:28px; text-align:center; animation:fadeUp .8s ease both .3s; opacity:0; }
.l-title { font-weight:900; font-size:2.4rem; letter-spacing:4px; color:var(--gold); text-shadow:0 0 20px rgba(240,165,0,0.6); }
.l-sub { font-family:"Dancing Script",cursive; font-size:1.3rem; color:var(--cream); opacity:.8; }
.l-dots { display:flex; gap:8px; justify-content:center; margin-top:18px; }
.l-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); animation:bounce 1.2s ease-in-out infinite; }
.l-dot:nth-child(2){animation-delay:.2s; background:#c47e00;}
.l-dot:nth-child(3){animation-delay:.4s;}
.l-tag { font-size:.8rem; letter-spacing:3px; text-transform:uppercase; color:rgba(240,165,0,.5); margin-top:14px; animation:fadeUp 1s ease both .7s; opacity:0; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
@keyframes bounce { 0%,80%,100%{transform:scale(.8);opacity:.4;}40%{transform:scale(1.4);opacity:1;} }
#loader.out { animation:loaderOut .6s ease forwards; }
@keyframes loaderOut { to{opacity:0;pointer-events:none;} }

/* ── APP ── */
#app { width:100%; max-width:430px; min-height:100vh; background:var(--cream); display:none; flex-direction:column; }
#app.on { display:flex; }

/* ── HERO ── */
.hero { background:linear-gradient(160deg, var(--dgreen) 0%, var(--green) 50%, var(--dgreen) 100%); position:relative; overflow:hidden; }
.hero-pat { position:absolute; inset:0; background-image:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(240,165,0,.04) 10px,rgba(240,165,0,.04) 20px),repeating-linear-gradient(-45deg,transparent,transparent 10px,rgba(240,165,0,.03) 10px,rgba(240,165,0,.03) 20px); }
.hero-top { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 10px; position:relative; z-index:2; }
.hero-logo { width:54px; height:54px; border-radius:50%; overflow:hidden; border:2px solid var(--gold); box-shadow:0 0 14px rgba(240,165,0,.4); }
.hero-logo img { width:100%; height:100%; object-fit:cover; }
.hero-badge { background:var(--gold); color:var(--dgreen); font-weight:900; font-size:.7rem; letter-spacing:1.5px; text-transform:uppercase; padding:5px 12px; border-radius:20px; animation:badgePulse 2s ease infinite; }
@keyframes badgePulse { 0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,.5);}50%{box-shadow:0 0 0 8px rgba(240,165,0,0);} }
.hero-main { padding:4px 18px 22px; position:relative; z-index:2; text-align:center; }
.hero-welcome { font-family:"Dancing Script",cursive; font-size:1.2rem; color:rgba(255,255,255,.7); display:block; margin-bottom:2px; }
.hero-title { font-weight:900; font-size:2.2rem; line-height:1; color:#fff; letter-spacing:1px; }
.hero-title span { color:var(--gold); }
.hero-sub { font-size:.85rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.5); margin-top:3px; }
.hero-div { display:flex; align-items:center; gap:10px; margin:10px auto 12px; width:80%; }
.hero-div-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold)); }
.hero-div-line:last-child { background:linear-gradient(to left,transparent,var(--gold)); }
.promo { background:linear-gradient(90deg,var(--gold),#ffcc44,var(--gold)); background-size:200% 100%; animation:shimmer 2.5s linear infinite; padding:9px 18px; text-align:center; position:relative; z-index:2; }
@keyframes shimmer { 0%{background-position:200% center;}100%{background-position:-200% center;} }
.promo-text { font-weight:900; font-size:.9rem; letter-spacing:2px; text-transform:uppercase; color:var(--dgreen); }

/* ── ADMIN TOGGLE ── */
.admin-toggle { background:var(--dgreen); border:none; color:rgba(240,165,0,.5); font-size:.65rem; letter-spacing:2px; text-transform:uppercase; padding:7px 18px; width:100%; cursor:pointer; font-family:"Barlow Condensed",sans-serif; transition:color .2s; }
.admin-toggle:hover { color:var(--gold); }

/* ── ADMIN PANEL ── */
#admin-panel { display:none; background:var(--dgreen); padding:16px 18px 18px; border-bottom:2px solid var(--gold); }
.admin-title { font-weight:900; font-size:1rem; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:12px; }
.admin-field { display:flex; flex-direction:column; gap:4px; flex:1; }
.admin-field label { font-size:.65rem; letter-spacing:1px; text-transform:uppercase; color:rgba(240,165,0,.6); }
.admin-field input { background:rgba(255,255,255,.07); border:1px solid rgba(240,165,0,.3); border-radius:6px; padding:8px 10px; color:#fff; font-family:"Barlow Condensed",sans-serif; font-size:1rem; outline:none; width:100%; }
.admin-field input:focus { border-color:var(--gold); background:rgba(255,255,255,.12); }
.admin-field input[type=file] { font-size:.8rem; padding:6px 8px; cursor:pointer; }
.admin-field input[type=file]::file-selector-button { background:var(--gold); color:var(--dgreen); border:none; padding:4px 10px; border-radius:4px; font-family:"Barlow Condensed",sans-serif; font-weight:700; font-size:.8rem; cursor:pointer; margin-right:8px; }
.row { display:flex; gap:8px; margin-bottom:10px; align-items:flex-end; }
.add-btn { background:var(--gold); color:var(--dgreen); border:none; border-radius:8px; padding:10px 18px; font-family:"Barlow Condensed",sans-serif; font-weight:900; font-size:1rem; letter-spacing:1px; cursor:pointer; white-space:nowrap; transition:box-shadow .2s; }
.add-btn:hover { box-shadow:0 4px 16px rgba(240,165,0,.4); }
.pass-row { display:flex; gap:8px; margin-bottom:12px; }
.pass-row input { flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(240,165,0,.3); border-radius:6px; padding:10px 12px; color:#fff; font-family:"Barlow Condensed",sans-serif; font-size:1.05rem; outline:none; }
.pass-row input:focus { border-color:var(--gold); background:rgba(255,255,255,.12); }
.unlock-btn { background:var(--gold); color:var(--dgreen); border:none; padding:10px 18px; border-radius:6px; font-family:"Barlow Condensed",sans-serif; font-weight:900; cursor:pointer; font-size:1rem; }
.err-msg { color:#ff6b6b; font-size:.8rem; letter-spacing:1px; margin-top:4px; display:none; }

/* ── PRODUCTS ── */
.products-section { padding:18px 14px 100px; flex:1; }
.sec-head { text-align:center; margin-bottom:16px; }
.sec-head h2 { font-weight:900; font-size:1.4rem; letter-spacing:2px; text-transform:uppercase; color:var(--green); }
.sec-head p { font-size:.8rem; color:var(--mgreen); letter-spacing:1px; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.pcard { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 4px 18px rgba(27,74,46,.15); animation:cardIn .5s ease both; }
@keyframes cardIn { from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);} }
.pimg { position:relative; aspect-ratio:1/1; overflow:hidden; background:#e8f4ec; }
.pimg img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
.pcard:active .pimg img { transform:scale(1.06); }
.ptag { position:absolute; top:8px; right:8px; background:#e53935; color:#fff; font-weight:900; font-size:.65rem; letter-spacing:1px; padding:3px 7px; border-radius:10px; text-transform:uppercase; }
.pinfo { padding:10px 10px 12px; }
.pname { font-weight:800; font-size:.95rem; color:var(--green); letter-spacing:.5px; line-height:1.2; margin-bottom:4px; min-height:2.4em; }
.prow { display:flex; align-items:center; justify-content:space-between; }
.pprice { font-weight:900; font-size:1.15rem; color:var(--gold); }
.pksh { font-size:.7rem; font-weight:700; color:var(--mgreen); }
.pdel { background:none; border:none; cursor:pointer; color:#ccc; font-size:1rem; padding:2px; display:none; transition:color .2s; }
.pdel:hover { color:#e53935; }
.admin-mode .pdel { display:block; }
.empty { grid-column:1/-1; text-align:center; padding:40px 20px; color:var(--mgreen); }
.empty-icon { font-size:3rem; margin-bottom:12px; opacity:.5; }
.placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#c8e6c9,#a5d6a7); font-size:2.5rem; }

/* ── FLOAT BTN ── */
.float-btn { position:fixed; bottom:28px; left:20px; z-index:500; background:linear-gradient(135deg,var(--green),var(--mgreen)); color:var(--gold); border:2px solid var(--gold); border-radius:50px; padding:14px 22px 14px 18px; display:flex; align-items:center; gap:10px; cursor:pointer; font-family:"Barlow Condensed",sans-serif; font-weight:900; font-size:1.05rem; letter-spacing:1.5px; text-transform:uppercase; animation:floatPulse 3s ease-in-out infinite; transition:transform .15s; box-shadow:0 6px 28px rgba(27,74,46,.5); }
@keyframes floatPulse { 0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);} }
.float-btn:active { transform:scale(.95) !important; }
.float-icon { width:28px; height:28px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.float-icon svg { width:15px; height:15px; fill:var(--dgreen); }

/* ── ORDER MODAL ── */
#order-modal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.85); backdrop-filter:blur(4px); align-items:flex-end; justify-content:center; }
#order-modal.open { display:flex; animation:bgIn .3s ease; }
@keyframes bgIn { from{opacity:0;}to{opacity:1;} }
.order-sheet { width:100%; max-width:430px; max-height:92vh; border-radius:24px 24px 0 0; overflow:hidden; animation:sheetUp .4s cubic-bezier(.34,1.56,.64,1) both; position:relative; }
@keyframes sheetUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
.order-sheet iframe { width:100%; height:92vh; border:none; border-radius:24px 24px 0 0; display:block; }
.order-close { position:absolute; top:12px; right:16px; background:rgba(255,255,255,.2); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; }
.order-close:hover { background:rgba(255,255,255,.35); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--cream); }
::-webkit-scrollbar-thumb { background:var(--gold); border-radius:4px; }
</style>
</head>

<script>
// ── CONFIG ──
var PASS = 'muthuri2024';
var unlocked = false;
var panelOpen = false;

// ── DEMO PRODUCTS ──
var products = [
  {name:'Fresh Tomatoes', price:50, disc:'20% OFF', emoji:'&#127813;'},
  {name:'Cooking Oil 1L', price:280, disc:'HOT DEAL', emoji:'&#129722;'},
  {name:'White Sugar 2kg', price:220, disc:'15% OFF', emoji:'&#127852;'},
  {name:'Unga wa Ugali 2kg', price:160, disc:'SAVE 30', emoji:'&#127806;'},
  {name:'Green Capsicum', price:30, disc:'', emoji:'&#129745;'},
  {name:'Fresh Onions 1kg', price:80, disc:'10% OFF', emoji:'&#129797;'},
  {name:'Ripe Bananas', price:60, disc:'', emoji:'&#127820;'},
  {name:'Potatoes 2kg', price:100, disc:'25% OFF', emoji:'&#129960;'},
  {name:'Washing Powder', price:150, disc:'DEAL', emoji:'&#129692;'},
  {name:'Fresh Carrots 1kg', price:70, disc:'', emoji:'&#129956;'}
];

function render() {
  var grid = document.getElementById('pgrid');
  if (!grid) return;
  grid.innerHTML = '';
  if (products.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#128722;</div><p style="font-weight:700;font-size:1rem;letter-spacing:1px;text-transform:uppercase;">No products yet</p><small style="font-size:.8rem;opacity:.6;display:block;margin-top:4px;">Open admin panel to add goods</small></div>';
    return;
  }
  products.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'pcard';
    card.style.animationDelay = (i * 0.07) + 's';
    var imgHtml = p.img
      ? '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy"/>'
      : '<div class="placeholder">' + p.emoji + '</div>';
    var tagHtml = p.disc ? '<div class="ptag">' + p.disc + '</div>' : '';
    card.innerHTML =
      '<div class="pimg">' + imgHtml + tagHtml + '</div>' +
      '<div class="pinfo">' +
        '<div class="pname">' + p.name + '</div>' +
        '<div class="prow">' +
          '<div><span class="pksh">KSh </span><span class="pprice">' + p.price + '</span></div>' +
          '<button class="pdel" data-idx="' + i + '" onclick="delProduct(' + i + ')">&#x2715;</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
  if (unlocked) grid.classList.add('admin-mode');
  else grid.classList.remove('admin-mode');
}

function delProduct(i) {
  if (!unlocked) return;
  products.splice(i, 1);
  render();
}

function toggleAdmin() {
  panelOpen = !panelOpen;
  document.getElementById('admin-panel').style.display = panelOpen ? 'block' : 'none';
}

function doUnlock() {
  var val = document.getElementById('admin-pass').value;
  var err = document.getElementById('pass-err');
  if (val === PASS) {
    unlocked = true;
    document.getElementById('v-locked').style.display = 'none';
    document.getElementById('v-unlocked').style.display = 'block';
    err.style.display = 'none';
    render();
  } else {
    err.style.display = 'block';
    document.getElementById('admin-pass').value = '';
  }
}

function doLock() {
  unlocked = false;
  document.getElementById('v-locked').style.display = 'block';
  document.getElementById('v-unlocked').style.display = 'none';
  document.getElementById('admin-pass').value = '';
  document.getElementById('pass-err').style.display = 'none';
  render();
}

function doAdd() {
  if (!unlocked) { alert('Please unlock admin first.'); return; }
  var name = document.getElementById('p-name').value.trim();
  var price = parseFloat(document.getElementById('p-price').value);
  var disc = document.getElementById('p-disc').value.trim();
  var fileInput = document.getElementById('p-img');
  if (!name || isNaN(price) || price <= 0) {
    alert('Please enter a product name and valid price.');
    return;
  }
  function insert(imgSrc) {
    products.unshift({name:name, price:price, disc:disc, img:imgSrc||null, emoji:'&#128717;'});
    render();
    document.getElementById('p-name').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-disc').value = '';
    fileInput.value = '';
    alert('Product added!');
  }
  if (fileInput.files && fileInput.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) { insert(e.target.result); };
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    insert(null);
  }
}
